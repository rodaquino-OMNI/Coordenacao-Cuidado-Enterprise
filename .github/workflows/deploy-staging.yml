name: Deploy to Staging

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: sa-east-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
      - run: aws eks update-kubeconfig --name austa-staging --region sa-east-1
      - run: |
          kubectl apply -f austa-care-platform/k8s/namespace.yaml
          kubectl apply -f austa-care-platform/k8s/deployments/
          kubectl apply -f austa-care-platform/k8s/services/
          kubectl apply -f austa-care-platform/k8s/ingress.yaml
      - run: kubectl rollout status deployment/backend -n austa-staging --timeout=5m
