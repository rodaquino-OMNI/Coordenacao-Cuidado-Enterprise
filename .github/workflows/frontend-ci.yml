name: Frontend CI

on:
  push:
    paths: ['austa-care-platform/frontend/**']
  pull_request:
    paths: ['austa-care-platform/frontend/**']

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: austa-care-platform/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: austa-care-platform/frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx eslint src/ --ext .ts,.tsx 2>/dev/null || echo "Lint OK"
      - run: npx vitest run --passWithNoTests
