name: Frontend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'austa-care-platform/frontend/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'austa-care-platform/frontend/**'
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  code-quality:
    name: Frontend Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: austa-care-platform/frontend/package-lock.json

      - name: Install dependencies
        working-directory: austa-care-platform/frontend
        run: npm ci --legacy-peer-deps

      - name: TypeScript type-check
        working-directory: austa-care-platform/frontend
        run: npx tsc --noEmit

      - name: Run ESLint
        working-directory: austa-care-platform/frontend
        run: npm run lint

      - name: Run Prettier
        working-directory: austa-care-platform/frontend
        run: npm run format:check

  tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: austa-care-platform/frontend/package-lock.json

      - name: Install dependencies
        working-directory: austa-care-platform/frontend
        run: npm ci --legacy-peer-deps

      - name: Run tests
        working-directory: austa-care-platform/frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build check
        working-directory: austa-care-platform/frontend
        run: npm run build

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          directory: ./austa-care-platform/frontend/coverage
          flags: frontend
