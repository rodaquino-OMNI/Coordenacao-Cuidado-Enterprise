openapi: "3.0.3"
info:
  title: AUSTA Care Platform API
  version: "1.0.0"
  description: |
    LGPD-compliant healthcare coordination platform for Brazilian health plans.

    **Domains**: Health Checks, Authentication, Clinical Risk Assessment,
    Gamification & Engagement, WhatsApp Webhooks via Z-API.

    **Authentication**: Bearer JWT (`Authorization: Bearer <token>`).
    Obtain tokens via `POST /api/v1/auth/login` or `POST /api/v1/auth/register`.

    **Error Format** (all endpoints):
    ```json
    { "success": false, "error": { "code": "ERROR_CODE", "message": "..." },
      "timestamp": "2026-06-27T...", "path": "/api/v1/...", "method": "GET" }
    ```

    **LGPD Compliance**: All PHI/PII data encrypted at rest via PostgreSQL pgcrypto
    (envelope encryption). See ADR-004.

    **Current Status (Jun 2026)**: Alpha / Pre-Production.
    Backend is a TypeScript monolith (Express + Prisma). Not yet on Kubernetes.
  contact:
    name: AUSTA Care Platform Team
    email: dev@austa.care
  license:
    name: Proprietary
    url: https://austa.care/legal

servers:
  - url: http://localhost:3000/api/v1
    description: Local development
  - url: https://api.staging.austa.com.br/api/v1
    description: Staging (planejado)

tags:
  - name: Health
    description: Health checks, probes e monitoramento
  - name: Auth
    description: Autenticação e autorização (JWT)
  - name: Clinical
    description: Algoritmos clínicos, risk assessment, detecção de emergência
  - name: Gamification
    description: Sistema de gamificação e engajamento de pacientes
  - name: WhatsApp
    description: Webhooks e mensagens via Z-API (WhatsApp Business)

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── General ──────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: Invalid request parameters
        timestamp:
          type: string
          format: date-time
        path:
          type: string
        method:
          type: string

    # ── Health ───────────────────────────────────────────────────────────
    HealthResponse:
      type: object
      required: [status, timestamp, uptime, version, components]
      properties:
        status:
          type: string
          enum: [healthy, unhealthy, degraded]
          example: healthy
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number
          description: Process uptime in seconds
          example: 3600.5
        version:
          type: string
          example: "1.0.0"
        components:
          type: object
          properties:
            database:
              $ref: "#/components/schemas/ComponentStatus"
            redis:
              $ref: "#/components/schemas/ComponentStatus"
            encryption:
              $ref: "#/components/schemas/EncryptionStatus"

    ComponentStatus:
      type: object
      properties:
        status:
          type: string
          enum: [up, down, degraded]
        latencyMs:
          type: number
          description: Latência do health check em milissegundos
        error:
          type: string
          description: Mensagem de erro se status = down

    EncryptionStatus:
      allOf:
        - $ref: "#/components/schemas/ComponentStatus"
        - type: object
          properties:
            algorithm:
              type: string
              example: aes256

    DeadMansSwitchResponse:
      type: object
      required: [status, timestamp, lastActivity, idleSeconds, thresholdSeconds]
      properties:
        status:
          type: string
          enum: [alive, stale, error]
        timestamp:
          type: string
          format: date-time
        lastActivity:
          type: string
          format: date-time
          description: Timestamp da última atividade registrada no sistema
        idleSeconds:
          type: number
          description: Segundos desde a última atividade
        thresholdSeconds:
          type: number
          description: Threshold configurado (default 300s / 5 min)

    ReadyResponse:
      type: object
      properties:
        status:
          type: string
          enum: [ready, "not ready"]
        timestamp:
          type: string
          format: date-time
        database:
          type: string
          enum: [up, down]
        encryption:
          type: string
          enum: [up, down]

    LiveResponse:
      type: object
      properties:
        status:
          type: string
          example: alive
        timestamp:
          type: string
          format: date-time
        uptime:
          type: number

    # ── Auth ─────────────────────────────────────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: paciente@exemplo.com.br
        password:
          type: string
          minLength: 8
          example: senhaSegura123
        deviceId:
          type: string
          description: Identificador do dispositivo para rastreamento de sessão

    RegisterRequest:
      type: object
      required: [email, password, firstName, lastName, cpf]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
        lastName:
          type: string
        cpf:
          type: string
          pattern: '^\d{11}$'
          description: CPF do paciente (apenas dígitos)
        phone:
          type: string
          description: Número de WhatsApp (formato +5511999999999)
        birthDate:
          type: string
          format: date

    AuthResponse:
      type: object
      properties:
        tokens:
          $ref: "#/components/schemas/Tokens"
        user:
          $ref: "#/components/schemas/UserProfile"

    Tokens:
      type: object
      properties:
        accessToken:
          type: string
          description: JWT access token (expira em 15 min)
        refreshToken:
          type: string
          description: JWT refresh token (expira em 7 dias)
        expiresIn:
          type: number
          example: 900
        tokenType:
          type: string
          example: Bearer

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        cpf:
          type: string
        phone:
          type: string
        roles:
          type: array
          items:
            type: string
          example: ["patient"]
        organizationId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    # ── Clinical ─────────────────────────────────────────────────────────
    AlgorithmVersion:
      type: object
      properties:
        name:
          type: string
        version:
          type: string
        description:
          type: string
        deployedAt:
          type: string
          format: date-time

    AlgorithmVersionsResponse:
      type: object
      properties:
        algorithms:
          type: array
          items:
            $ref: "#/components/schemas/AlgorithmVersion"
        timestamp:
          type: string
          format: date-time

    SingleAlgorithmResponse:
      type: object
      properties:
        name:
          type: string
        version:
          type: string

    RiskAssessmentRequest:
      type: object
      required: [patientId]
      properties:
        patientId:
          type: string
          format: uuid
        questionnaireId:
          type: string
          format: uuid
          description: ID do questionário preenchido
        responses:
          type: object
          description: Respostas do questionário de saúde
        vitalSigns:
          type: object
          properties:
            systolicBP:
              type: number
            diastolicBP:
              type: number
            heartRate:
              type: number
            temperature:
              type: number
            oxygenSaturation:
              type: number
            bloodGlucose:
              type: number
        clinicalHistory:
          type: array
          items:
            type: string
          description: Condições clínicas conhecidas

    RiskAssessmentResponse:
      type: object
      properties:
        algorithmVersion:
          type: string
        riskLevel:
          type: string
          enum: [low, moderate, high, critical]
          description: Nível de risco calculado
        score:
          type: number
          description: Score numérico (0-100)
        factors:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              weight:
                type: number
              value:
                type: number
        recommendations:
          type: array
          items:
            type: string
        requiresImmediateAttention:
          type: boolean

    EmergencyDetectionRequest:
      type: object
      required: [riskAssessmentId, organizationId]
      properties:
        riskAssessmentId:
          type: string
          format: uuid
        organizationId:
          type: string
          format: uuid

    EmergencyAlert:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [immediate, critical, high]
        severity:
          type: string
        message:
          type: string
        recommendedAction:
          type: string

    EmergencyDetectionResponse:
      type: object
      properties:
        algorithmVersion:
          type: string
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/EmergencyAlert"
        count:
          type: integer

    # ── Gamification ─────────────────────────────────────────────────────
    HealthPointsResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        totalPoints:
          type: integer
          example: 1250
        availablePoints:
          type: integer
        currentLevel:
          type: integer
          example: 5
        experiencePoints:
          type: integer
        nextLevelAt:
          type: integer
          example: 600
        rank:
          type: string
          enum: [Bronze, Silver, Gold]

    PointsHistoryResponse:
      type: object
      properties:
        pointsHistory:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              points:
                type: integer
              reason:
                type: string
              category:
                type: string
              earnedAt:
                type: string
                format: date-time
        pagination:
          type: object
          properties:
            page:
              type: integer
            limit:
              type: integer
            total:
              type: integer
            totalPages:
              type: integer
        summary:
          type: object
          properties:
            totalPoints:
              type: integer
            pointsThisWeek:
              type: integer
            pointsThisMonth:
              type: integer

    Mission:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [health_tracking, engagement, education, achievement, referral]
        pointsReward:
          type: integer
        isActive:
          type: boolean

    ProgressResponse:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        level:
          type: integer
        totalPoints:
          type: integer
        achievements:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              title:
                type: string
              description:
                type: string
              progress:
                type: integer
              target:
                type: integer
              reward:
                type: integer
              status:
                type: string
                enum: [completed, in_progress]
        streaks:
          type: object
          properties:
            current:
              type: integer
            longest:
              type: integer
            lastActivity:
              type: string
              format: date-time

    # ── WhatsApp ─────────────────────────────────────────────────────────
    WhatsAppWebhookRequest:
      type: object
      properties:
        entry:
          type: array
          items:
            type: object
            properties:
              changes:
                type: array
                items:
                  type: object
                  properties:
                    field:
                      type: string
                      enum: [messages]
                    value:
                      type: object
                      properties:
                        messages:
                          type: array
                          items:
                            $ref: "#/components/schemas/WhatsAppInboundMessage"
                        statuses:
                          type: array
                          items:
                            $ref: "#/components/schemas/WhatsAppStatusUpdate"

    WhatsAppInboundMessage:
      type: object
      properties:
        id:
          type: string
          description: WhatsApp message ID (usado para idempotência)
        from:
          type: string
          description: Número do remetente
        type:
          type: string
          enum: [text, image, audio, video, document, location, interactive]
        timestamp:
          type: string
        text:
          type: object
          properties:
            body:
              type: string

    WhatsAppStatusUpdate:
      type: object
      properties:
        id:
          type: string
          description: WhatsApp message ID
        status:
          type: string
          enum: [sent, delivered, read, failed]
        timestamp:
          type: string

paths:
  # ═══════════════════════════════════════════════════════════════════════
  # HEALTH
  # ═══════════════════════════════════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      summary: Component-level health check
      description: |
        Verifica todos os componentes do sistema (database, Redis, pgcrypto encryption)
        com medição de latência. Redis é opcional — o sistema opera em modo degradado
        sem cache se Redis estiver indisponível.
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Sistema saudável (database + encryption OK, Redis opcional)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
              example:
                status: healthy
                timestamp: "2026-06-27T12:00:00.000Z"
                uptime: 3600.5
                version: "1.0.0"
                components:
                  database:
                    status: up
                    latencyMs: 2
                  redis:
                    status: up
                    latencyMs: 1
                  encryption:
                    status: up
                    latencyMs: 5
                    algorithm: aes256
        "503":
          description: Sistema degradado ou indisponível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /health/dead-mans-switch:
    get:
      tags: [Health]
      summary: Dead man's switch endpoint
      description: |
        Endpoint para monitoramento externo (Prometheus Blackbox Exporter).
        Retorna o timestamp da última atividade do sistema.
        Se `idleSeconds` exceder `thresholdSeconds` (default 300s / 5 min),
        retorna status "stale" com HTTP 503 para disparar alertas.
      operationId: getDeadMansSwitch
      security: []
      responses:
        "200":
          description: Sistema ativo — atividade recente dentro do threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeadMansSwitchResponse"
              example:
                status: alive
                timestamp: "2026-06-27T12:00:00.000Z"
                lastActivity: "2026-06-27T11:59:55.000Z"
                idleSeconds: 5
                thresholdSeconds: 300
        "503":
          description: Sistema stale — sem atividade por mais tempo que o threshold
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeadMansSwitchResponse"
              example:
                status: stale
                timestamp: "2026-06-27T12:00:00.000Z"
                lastActivity: "2026-06-27T11:50:00.000Z"
                idleSeconds: 600
                thresholdSeconds: 300

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: |
        Verifica apenas serviços críticos: database e pgcrypto encryption.
        Usado como readiness probe para Kubernetes ou load balancers.
        Não verifica Redis (é opcional para operação).
      operationId: getReadiness
      security: []
      responses:
        "200":
          description: Pronto para receber tráfego
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
              example:
                status: ready
                timestamp: "2026-06-27T12:00:00.000Z"
        "503":
          description: Não está pronto — database ou encryption indisponível
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadyResponse"
              example:
                status: "not ready"
                timestamp: "2026-06-27T12:00:00.000Z"
                database: up
                encryption: down

  /health/live:
    get:
      tags: [Health]
      summary: Liveness probe
      description: |
        Probe leve que apenas verifica se o processo está rodando.
        Não verifica dependências externas. Usado como liveness probe
        para Kubernetes (reinicia o pod se falhar).
      operationId: getLiveness
      security: []
      responses:
        "200":
          description: Processo vivo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LiveResponse"
              example:
                status: alive
                timestamp: "2026-06-27T12:00:00.000Z"
                uptime: 3600.5

  # ═══════════════════════════════════════════════════════════════════════
  # AUTH
  # ═══════════════════════════════════════════════════════════════════════
  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      description: |
        Autentica usuário e retorna JWT access token + refresh token.
        ⚠️ NOTA (Jun 2026): Endpoint registrado mas implementação pendente (retorna 501).
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Endpoint não implementado ainda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register
      description: |
        Registra novo usuário (paciente) na plataforma.
        ⚠️ NOTA (Jun 2026): Endpoint registrado mas implementação pendente (retorna 501).
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registro realizado com sucesso
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Dados inválidos ou CPF já cadastrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Rate limit excedido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Endpoint não implementado ainda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT token
      description: |
        Renova o access token usando um refresh token válido.
        ⚠️ NOTA (Jun 2026): Endpoint registrado mas implementação pendente (retorna 501).
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Tokens renovados
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    $ref: "#/components/schemas/Tokens"
        "401":
          description: Refresh token inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "501":
          description: Endpoint não implementado ainda
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      description: Retorna o perfil do usuário autenticado a partir do JWT.
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Perfil do usuário atual
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: "#/components/schemas/UserProfile"
        "401":
          description: Token ausente, inválido ou expirado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ═══════════════════════════════════════════════════════════════════════
  # CLINICAL
  # ═══════════════════════════════════════════════════════════════════════
  /clinical/algorithm-versions:
    get:
      tags: [Clinical]
      summary: List all registered clinical algorithm versions
      description: |
        Retorna todas as versões de algoritmos clínicos registrados no sistema.
        Inclui risk-assessment, emergency-detection, e outros algoritmos de IA clínica.
        Endpoint público — não requer autenticação.
        Ver ADR-005 para política de versionamento de algoritmos.
      operationId: listAlgorithmVersions
      security: []
      responses:
        "200":
          description: Lista de algoritmos com versões e metadados
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlgorithmVersionsResponse"
              example:
                algorithms:
                  - name: risk-assessment
                    version: "2.1.0"
                    description: Avaliação de risco multifatorial com ML
                    deployedAt: "2026-06-15T00:00:00.000Z"
                  - name: emergency-detection
                    version: "1.3.0"
                    description: Detecção de emergências a partir de risk scores
                    deployedAt: "2026-06-10T00:00:00.000Z"
                timestamp: "2026-06-27T12:00:00.000Z"

  /clinical/algorithm-version/{name}:
    get:
      tags: [Clinical]
      summary: Get version of a specific algorithm
      operationId: getAlgorithmVersion
      security: []
      parameters:
        - name: name
          in: path
          required: true
          schema:
            type: string
            example: risk-assessment
      responses:
        "200":
          description: Versão do algoritmo
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SingleAlgorithmResponse"
        "404":
          description: Algoritmo não registrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinical/risk-assessment:
    post:
      tags: [Clinical]
      summary: Run risk assessment
      description: |
        Executa o pipeline de avaliação de risco avançada com base nas respostas
        do questionário, sinais vitais e histórico clínico do paciente.
        Utiliza o algoritmo registrado (versionado conforme ADR-005).
      operationId: runRiskAssessment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskAssessmentRequest"
      responses:
        "200":
          description: Resultado da avaliação de risco
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskAssessmentResponse"
        "400":
          description: Dados inválidos ou paciente não encontrado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro no pipeline de avaliação
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /clinical/emergency-detection:
    post:
      tags: [Clinical]
      summary: Run emergency detection
      description: |
        Executa detecção de emergências com base em um risk assessment já realizado.
        Retorna alertas classificados por severidade (immediate, critical, high).
        Pode disparar escalação automática se configurado.
      operationId: runEmergencyDetection
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmergencyDetectionRequest"
      responses:
        "200":
          description: Alertas de emergência detectados (pode ser array vazio)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmergencyDetectionResponse"
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Erro na detecção de emergência
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ═══════════════════════════════════════════════════════════════════════
  # GAMIFICATION
  # ═══════════════════════════════════════════════════════════════════════
  /gamification/user/{userId}/profile:
    get:
      tags: [Gamification]
      summary: Get user gamification profile
      description: |
        Retorna o perfil completo de gamificação do usuário: nível, pontos,
        badges, achievements, streaks e estatísticas.
      operationId: getUserGamificationProfile
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Perfil de gamificação do usuário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProgressResponse"
        "403":
          description: Acesso negado (usuário só pode ver o próprio perfil, admin pode ver qualquer)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gamification/user/{userId}/healthpoints:
    get:
      tags: [Gamification]
      summary: Get user health points and history
      description: |
        Retorna o histórico de pontos de saúde do usuário com sumário
        semanal e mensal, além do total acumulado.
      operationId: getUserHealthPoints
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: Histórico de pontos com sumário
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PointsHistoryResponse"
        "403":
          description: Acesso negado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gamification/user/{userId}/achievements:
    get:
      tags: [Gamification]
      summary: Get user onboarding progress and achievements
      description: |
        Retorna o progresso do usuário em todas as achievements (conquistas).
        Inclui status de cada achievement (completed/in_progress).
      operationId: getUserAchievements
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Lista de achievements com progresso
          content:
            application/json:
              schema:
                type: object
                properties:
                  achievements:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        title:
                          type: string
                        description:
                          type: string
                        progress:
                          type: integer
                        target:
                          type: integer
                        reward:
                          type: integer
                        status:
                          type: string
                          enum: [completed, in_progress]
                  completed:
                    type: integer
                  inProgress:
                    type: integer
        "403":
          description: Acesso negado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gamification/leaderboard:
    get:
      tags: [Gamification]
      summary: Get leaderboard
      description: Ranking de usuários por pontos de saúde.
      operationId: getLeaderboard
      security:
        - bearerAuth: []
      parameters:
        - name: timeframe
          in: query
          schema:
            type: string
            enum: [daily, weekly, monthly, all_time]
            default: weekly
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
            maximum: 100
        - name: category
          in: query
          schema:
            type: string
            enum: [health_tracking, engagement, education, achievement, referral, overall]
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: object
                properties:
                  leaderboard:
                    type: array
                    items:
                      type: object
                      properties:
                        rank:
                          type: integer
                        userId:
                          type: string
                        userName:
                          type: string
                        points:
                          type: integer
                        level:
                          type: integer
                  timeframe:
                    type: string
                  userPosition:
                    type: object
                    nullable: true

  /gamification/badges:
    get:
      tags: [Gamification]
      summary: List all available badges
      operationId: listBadges
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Lista de badges disponíveis
          content:
            application/json:
              schema:
                type: object
                properties:
                  badges:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        name:
                          type: string
                        description:
                          type: string
                        icon:
                          type: string
                        rarity:
                          type: string
                          enum: [common, rare, epic]

  # ═══════════════════════════════════════════════════════════════════════
  # WHATSAPP WEBHOOKS
  # ═══════════════════════════════════════════════════════════════════════
  /webhooks/whatsapp/webhook:
    get:
      tags: [WhatsApp]
      summary: WhatsApp webhook verification
      description: |
        Endpoint de verificação para o Z-API (WhatsApp Business API).
        O Z-API envia uma requisição GET com hub.mode, hub.verify_token e hub.challenge
        para verificar que o webhook está configurado corretamente.
        Responde com o challenge se o token for válido.
      operationId: verifyWhatsAppWebhook
      security: []
      parameters:
        - name: hub.mode
          in: query
          required: true
          schema:
            type: string
          description: Deve ser "subscribe"
        - name: hub.verify_token
          in: query
          required: true
          schema:
            type: string
          description: Token configurado no Z-API (WHATSAPP_VERIFY_TOKEN)
        - name: hub.challenge
          in: query
          required: true
          schema:
            type: string
          description: Valor a ser retornado para confirmar a verificação
      responses:
        "200":
          description: Verificação bem sucedida — retorna o challenge
          content:
            text/plain:
              schema:
                type: string
        "403":
          description: Token de verificação inválido
    post:
      tags: [WhatsApp]
      summary: WhatsApp incoming webhook
      description: |
        Recebe mensagens e status updates do WhatsApp via Z-API.
        **Idempotente**: Mensagens duplicadas são detectadas pelo whatsappMessageId
        e ignoradas (ver ADR-006).
        Processa:
        - Mensagens recebidas (persiste no banco, cria/atualiza conversa)
        - Status updates (sent, delivered, read, failed)
      operationId: receiveWhatsAppWebhook
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WhatsAppWebhookRequest"
      responses:
        "200":
          description: Webhook processado com sucesso
        "400":
          description: Payload inválido
        "500":
          description: Erro interno no processamento

  /webhooks/whatsapp/send:
    post:
      tags: [WhatsApp]
      summary: Send WhatsApp message
      description: Envia mensagem via Z-API e persiste no banco de dados.
      operationId: sendWhatsAppMessage
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [to, type]
              properties:
                to:
                  type: string
                  pattern: '^\+\d{10,15}$'
                  description: Número do destinatário (WhatsApp)
                  example: "+5511999999999"
                type:
                  type: string
                  enum: [text, template, interactive]
                  default: text
                text:
                  type: object
                  properties:
                    body:
                      type: string
                      description: Corpo da mensagem de texto
                template:
                  type: object
                  properties:
                    name:
                      type: string
                    language:
                      type: object
                      properties:
                        code:
                          type: string
                          example: pt_BR
                    components:
                      type: array
                      items: {}
      responses:
        "201":
          description: Mensagem enviada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  to:
                    type: string
                  type:
                    type: string
                  status:
                    type: string
                    example: sent
                  timestamp:
                    type: string
                    format: date-time
                  zapiResponse:
                    type: object
        "400":
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /webhooks/whatsapp/messages:
    get:
      tags: [WhatsApp]
      summary: Get WhatsApp message history
      description: Retorna histórico paginado de mensagens WhatsApp com filtros.
      operationId: getWhatsAppMessages
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            maximum: 100
        - name: phoneNumber
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [sent, delivered, read, failed]
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Lista paginada de mensagens
          content:
            application/json:
              schema:
                type: object
                properties:
                  messages:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        from:
                          type: string
                        to:
                          type: string
                        type:
                          type: string
                        text:
                          type: object
                        timestamp:
                          type: string
                        status:
                          type: string
                        direction:
                          type: string
                  pagination:
                    type: object
                    properties:
                      page:
                        type: integer
                      limit:
                        type: integer
                      total:
                        type: integer
                      totalPages:
                        type: integer
