  name: allow-backend-to-postgres
  namespace: austa-production
spec:
  podSelector:
    matchLabels:
      app: austa-backend
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: database
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
