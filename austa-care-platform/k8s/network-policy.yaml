# AUSTA Care Platform - Network Policies
# Política de rede restritiva conforme LGPD e melhores práticas de segurança
# Estratégia: default-deny-all + regras de egress específicas por componente

---
# Default deny all ingress traffic in production namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: austa-production
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Default deny all ingress traffic in staging namespace
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: austa-staging
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from Ingress Controller to frontend (production)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: austa-production
spec:
  podSelector:
    matchLabels:
      app: austa-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 80
---
# Allow ingress from Ingress Controller to frontend (staging)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-frontend
  namespace: austa-staging
spec:
  podSelector:
    matchLabels:
      app: austa-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kong
      ports:
        - protocol: TCP
          port: 80
---
# Allow frontend to talk to backend (production)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend-to-backend
  namespace: austa-production
spec:
  podSelector:
    matchLabels:
      app: austa-backend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: austa-frontend
      ports:
        - protocol: TCP
          port: 3000
---
